services:
  # ============================================================
  # ai-server: 核心服务 (HTTP + gRPC + Bifrost 原生模型运行)
  # ============================================================
  ai-server:
    build:
      context: ../..
      dockerfile: deploy/docker/ai-server.Dockerfile
      args:
        TARGETOS: linux
        TARGETARCH: amd64
    ports:
      - "18080:8080"      # HTTP + WebSocket + 前端
      - "18090:18090"     # gRPC (host-agent 接入)
    volumes:
      - ai-data:/data
    environment:
      - AIOPS_HTTP_ADDR=0.0.0.0:8080
      - AIOPS_GRPC_ADDR=0.0.0.0:18090
      - DEFAULT_WORKSPACE=/data/workspace
      - APP_STATE_PATH=/data/ai-server-state.json
      - APP_AUDIT_LOG_PATH=/data/ai-audit.log
      - HOST_AGENT_BOOTSTRAP_TOKEN=${HOST_AGENT_BOOTSTRAP_TOKEN:-change-me}
      - FRONTEND_REDIRECT_URL=http://127.0.0.1:18080/
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_API_KEYS=${LLM_API_KEYS:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_FALLBACK_PROVIDER=${LLM_FALLBACK_PROVIDER:-}
      - LLM_FALLBACK_MODEL=${LLM_FALLBACK_MODEL:-}
      - LLM_FALLBACK_API_KEY=${LLM_FALLBACK_API_KEY:-}
      - LLM_COMPACT_MODEL=${LLM_COMPACT_MODEL:-gpt-4o-mini}
      # Coroot 集成配置
      - COROOT_BASE_URL=${COROOT_BASE_URL:-}
      - COROOT_TOKEN=${COROOT_TOKEN:-}
      - COROOT_TIMEOUT=${COROOT_TIMEOUT:-30s}
      - COROOT_PRIORITY=${COROOT_PRIORITY:-coroot_first}
      - COROOT_FALLBACK_ENABLED=${COROOT_FALLBACK_ENABLED:-true}
      - COROOT_HEALTH_CHECK_INTERVAL=${COROOT_HEALTH_CHECK_INTERVAL:-30s}
      - COROOT_RCA_ENABLED=${COROOT_RCA_ENABLED:-false}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/api/v1/healthz"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ============================================================
  # host-agent: 本机测试用 agent (可选)
  # ============================================================
  host-agent-local:
    build:
      context: ../..
      dockerfile: deploy/docker/host-agent.Dockerfile
    environment:
      - AIOPS_SERVER_GRPC_ADDR=ai-server:18090
      - AIOPS_AGENT_HOST_ID=docker-local
      - AIOPS_AGENT_HOSTNAME=docker-local
      - AIOPS_AGENT_BOOTSTRAP_TOKEN=${HOST_AGENT_BOOTSTRAP_TOKEN:-change-me}
      - AIOPS_AGENT_LABELS=env=docker,role=test
    depends_on:
      ai-server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ai-data:
